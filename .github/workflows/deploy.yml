name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        required: true
        default: production
        type: choice
        options:
          - production
          - staging
      version:
        description: Image tag to deploy (e.g. 1.0.0, sha-abc1234)
        required: true
        default: latest
      rollback:
        description: Rollback to previous version on failure
        required: false
        default: true
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/tokensbyte

jobs:
  validate:
    name: Validate Inputs
    runs-on: ubuntu-latest
    outputs:
      backend_image: ${{ steps.images.outputs.backend }}
      frontend_image: ${{ steps.images.outputs.frontend }}
    steps:
      - name: Resolve image tags
        id: images
        run: |
          if [ "${{ inputs.version }}" = "latest" ]; then
            TAG="latest"
          else
            TAG="${{ inputs.version }}"
          fi
          echo "backend=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${TAG}" >> $GITHUB_OUTPUT
          echo "frontend=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${TAG}" >> $GITHUB_OUTPUT

      - name: Verify images exist
        run: |
          echo "Backend:  ${{ steps.images.outputs.backend }}"
          echo "Frontend: ${{ steps.images.outputs.frontend }}"
          echo "Env:      ${{ inputs.environment }}"
          echo "Rollback: ${{ inputs.rollback }}"

  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    needs: validate
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH || '/opt/tokensbyte' }}

            echo "=== Deploying TokensByte to ${{ inputs.environment }} ==="

            BACKEND_IMAGE="${{ needs.validate.outputs.backend_image }}"
            FRONTEND_IMAGE="${{ needs.validate.outputs.frontend_image }}"

            echo "Pulling images..."
            docker pull "${BACKEND_IMAGE}"
            docker pull "${FRONTEND_IMAGE}"

            echo "Tagging local images..."
            docker tag "${BACKEND_IMAGE}" tokensbyte-backend:latest
            docker tag "${FRONTEND_IMAGE}" tokensbyte-frontend:latest

            echo "Backing up current state..."
            docker compose ps -q > .deploy-prev-containers.txt 2>/dev/null || true

            echo "Starting services..."
            docker compose up -d

            echo "Waiting for health checks..."
            sleep 15

            echo "Verifying deployment..."
            if ! docker compose ps | grep -q "unhealthy\|exited"; then
              echo "Deployment successful!"
            else
              echo "Health check failed!"
              if [ "${{ inputs.rollback }}" = "true" ]; then
                echo "Rolling back..."
                docker compose down
                docker compose up -d
              fi
              exit 1
            fi

            echo "Cleaning up old images..."
            docker image prune -f

            echo "=== Deployment complete ==="

  notify:
    name: Notify Deployment Result
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    steps:
      - name: Deployment notification
        run: |
          if [ "${{ needs.deploy.result }}" = "success" ]; then
            echo "Deployment to ${{ inputs.environment }} succeeded!"
          else
            echo "Deployment to ${{ inputs.environment }} failed!"
            exit 1
          fi
