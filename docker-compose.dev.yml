
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    volumes:
      # 将宿主机的后台源码映射入容器内，以便感知文件变动
      - ./backend:/usr/src/app
      # 映射独立的 target 构建缓存，防止在 Windows 系统和 Linux 容器之间出现 target 锁死或交叉污染
      - backend-target:/usr/src/app/target
      # 映射 Cargo 安装包目录，加速每次重建依赖的下载
      - cargo-registry:/usr/local/cargo/registry
    environment:
      - CARGO_TARGET_DIR=/usr/src/app/target

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    environment:
      # Docker 容器内代理到后端服务名；本地直接 npm run dev 时 vite.config.ts 回落到 localhost:3000
      - VITE_API_TARGET=http://backend:3000
    volumes:
      # 映射前端源码，Vite HMR 自动感知文件变动并热更新
      - ./frontend:/app
      # 使用独立命名卷隔离 node_modules，防止宿主机与容器之间出现依赖冗余问题
      - frontend-node-modules:/app/node_modules

volumes:
  backend-target:
  cargo-registry:
  frontend-node-modules:
