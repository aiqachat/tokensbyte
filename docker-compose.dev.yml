
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    # 开发模式总是重新构建，避免镜像过期问题
    pull_policy: missing
    container_name: ${PROJECT_NAME:-tokensbyte}-backend-dev
    ports:
      # 开发模式暴露后端端口，方便调试和测试 API
      - "${BACKEND_PORT:-3000}:3000"
    environment:
      - HOST=0.0.0.0
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL:-postgres://tokensapi:tokensapi@postgres:5432/tokensapi}
      - JWT_SECRET=${JWT_SECRET:-tokensbyte-change-me-in-development}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - REGISTER_ENABLED=${REGISTER_ENABLED:-true}
      - RUST_LOG=${RUST_LOG:-info}
      - CARGO_TARGET_DIR=/usr/src/app/target
      - DATA_DIR=/usr/src/app/data
    command: cargo watch -c -w src -x run
    volumes:
      # 将宿主机的后台源码映射入容器内，以便感知文件变动
      - ./backend:/usr/src/app
      # 挂载前端源码目录，让后端编译时能成功包含 include_str! 的前端国际化文件
      - ./frontend:/usr/src/frontend:ro
      # 将 Git 挂载入内，允许构建过程能够提取版本日志
      - ./.git:/usr/src/app/.git:ro
      # 映射独立的 target 构建缓存
      - backend-target:/usr/src/app/target
      # 映射 Cargo 安装包目录，加速构建
      - cargo-registry:/usr/local/cargo/registry
      # 映射 data 目录用于存储静态资源
      - ./data:/usr/src/app/data
    networks:
      - app-network
    depends_on:
      postgres:
        condition: service_healthy
    # 开发模式移除内存限制，避免 Rust 编译 OOM
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
        reservations:
          memory: 512M
          cpus: '1.0'
    # 开发环境健康检查
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: always

  postgres:
    # 开发模式暴露数据库端口，方便 Navicat 等工具连接
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  postgres-os:
    image: postgres:18.4-alpine
    container_name: ${PROJECT_NAME:-tokensbyte}-postgres-os
    command: postgres -c shared_buffers=128MB
    environment:
      - POSTGRES_USER=tokensapi
      - POSTGRES_PASSWORD=tokensapi
      - POSTGRES_DB=tokensapi
    ports:
      - "5433:5432"
    volumes:
      - postgres-data-os:/var/lib/postgresql
    networks:
      - app-network
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U tokensapi" ]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    # 开发模式总是重新构建，避免镜像过期问题
    pull_policy: missing
    container_name: ${PROJECT_NAME:-tokensbyte}-frontend-dev
    environment:
      # Docker 容器内代理到后端服务名；本地直接 npm run dev 时 vite.config.ts 回落到 localhost:3000
      - VITE_API_TARGET=http://backend:3000
    volumes:
      # 映射前端源码，Vite HMR 自动感知文件变动并热更新
      - ./frontend:/app
      # 使用独立命名卷隔离 node_modules，防止宿主机与容器之间出现依赖冗余问题
      - frontend-node-modules:/app/node_modules
    ports: !override
      # 开发模式 Vite 运行在 5173 端口，完全覆盖生产模式的 8080:80
      - "${FRONTEND_PORT:-5173}:5173"
    networks:
      - app-network
    depends_on:
      backend:
        condition: service_started
    restart: always

volumes:
  backend-target:
    name: ${PROJECT_NAME:-tokensbyte}-backend-target
  cargo-registry:
    name: ${PROJECT_NAME:-tokensbyte}-cargo-registry
  frontend-node-modules:
    name: ${PROJECT_NAME:-tokensbyte}-frontend-node-modules

  postgres-data-os:
    name: ${PROJECT_NAME:-tokensbyte}-postgres-data-os
