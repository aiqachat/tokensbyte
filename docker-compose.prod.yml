version: '3.8'

# TokensByte 生产环境 Docker Compose 配置
# 使用外部 PostgreSQL 数据库，仅包含 Backend 和 Frontend 两个服务
#
# 使用前请在 .env 文件中配置 DATABASE_URL，例如：
#   DATABASE_URL=postgres://用户名:密码@数据库地址:5432/数据库名

services:
  # Rust 后端服务
  backend:
    # 如果已导入镜像，使用 image；如果需要构建，使用 build
    image: tokensbyte-backend:latest
    # build:
    #   context: ./backend
    #   dockerfile: Dockerfile
    container_name: tokensbyte-backend
    environment:
      - HOST=0.0.0.0
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL:?请在 .env 中配置 DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET:-tokensbyte-change-me-in-production}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - REGISTER_ENABLED=${REGISTER_ENABLED:-true}
      - RUST_LOG=${RUST_LOG:-info}
    volumes:
      - ./data:/data
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    networks:
      - tokensbyte-network
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.5'

  # React 前端服务（Nginx）
  frontend:
    # 如果已导入镜像，使用 image；如果需要构建，使用 build
    image: tokensbyte-frontend:latest
    # build:
    #   context: ./frontend
    #   dockerfile: Dockerfile
    container_name: tokensbyte-frontend
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    networks:
      - tokensbyte-network
    depends_on:
      - backend
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.25'

# 网络配置
networks:
  tokensbyte-network:
    driver: bridge
    name: tokensbyte-network
