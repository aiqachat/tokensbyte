version: '3.8'

# TokensByte 生产环境 Docker Compose 配置
# 包含 PostgreSQL、Backend、Frontend 三个服务

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:16-alpine
    container_name: tokensbyte-postgres
    environment:
      - POSTGRES_DB=tokensbyte
      - POSTGRES_USER=tokensbyte
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-tokensbyte_secure_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - tokensbyte-network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tokensbyte"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'

  # Rust 后端服务
  backend:
    # 如果已导入镜像，使用 image；如果需要构建，使用 build
    image: tokensbyte-backend:latest
    # build:
    #   context: ./backend
    #   dockerfile: Dockerfile
    container_name: tokensbyte-backend
    environment:
      - HOST=0.0.0.0
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL:-postgres://tokensbyte:tokensbyte_secure_password@postgres:5432/tokensbyte}
      - JWT_SECRET=${JWT_SECRET:-tokensbyte-change-me-in-production}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - REGISTER_ENABLED=${REGISTER_ENABLED:-true}
      - RUST_LOG=${RUST_LOG:-info}
    volumes:
      - ./data:/data
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    networks:
      - tokensbyte-network
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.5'

  # React 前端服务（Nginx）
  frontend:
    # 如果已导入镜像，使用 image；如果需要构建，使用 build
    image: tokensbyte-frontend:latest
    # build:
    #   context: ./frontend
    #   dockerfile: Dockerfile
    container_name: tokensbyte-frontend
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    networks:
      - tokensbyte-network
    depends_on:
      - backend
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.25'

# 网络配置
networks:
  tokensbyte-network:
    driver: bridge
    name: tokensbyte-network

# 数据卷
volumes:
  postgres_data:
    name: tokensbyte-postgres-data
    driver: local
