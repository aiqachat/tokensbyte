# TokensByte 环境 Docker Compose 配置
# 包含 Backend、Frontend 和内生 PostgreSQL 数据库服务

services:
  postgres:
    image: postgres:15-alpine
    container_name: tokensbyte-postgres
    environment:
      - POSTGRES_USER=tokensapi
      - POSTGRES_PASSWORD=tokensapi
      - POSTGRES_DB=tokensapi
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: always

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: tokensbyte-backend
    environment:
      - HOST=0.0.0.0
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL:?请在 .env 中配置 DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET:-tokensbyte-change-me}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-123456}
      - REGISTER_ENABLED=${REGISTER_ENABLED:-true}
    volumes:
      - ./backend/data:/data
    ports:
      - "3000:3000"
    depends_on:
      - postgres
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tokensbyte-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: always

volumes:
  postgres-data:
