# TokensByte Docker Compose 配置
# ──────────────────────────────────────────────────
# 一键启动: docker compose up -d
#
# 优先级: .env 文件 > compose 内默认值
# 镜像策略: pull_policy=never 使用本地镜像，不自动构建
# 如需重新构建: docker compose build 或改 pull_policy: missing
# ──────────────────────────────────────────────────
#
# ── 切换为外部数据库 ──────────────────────────────
# 1. 修改 .env 中的 DATABASE_URL 指向外部数据库
#    例: DATABASE_URL=postgres://user:pass@db.example.com:5432/tokensbyte
# 2. 注释掉下方 postgres 服务
# 3. 删除 backend 的 depends_on: postgres
# ──────────────────────────────────────────────────

services:
  postgres:
    image: postgres:16-alpine
    container_name: ${PROJECT_NAME:-tokensbyte}-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-tokensapi}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-tokensapi}
      - POSTGRES_DB=${POSTGRES_DB:-tokensapi}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    # 可选：暴露端口到宿主机，方便本地工具连接（如 pgAdmin, DBeaver 等）
    # 如需暴露，取消下面两行注释
    # ports:
    #   - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - app-network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tokensapi}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ${PROJECT_NAME:-tokensbyte}-backend:latest
    build:
      context: .
      dockerfile: backend/Dockerfile
    pull_policy: never
    container_name: ${PROJECT_NAME:-tokensbyte}-backend
    stop_grace_period: 120s
    environment:
      - HOST=0.0.0.0
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL:-postgres://tokensapi:tokensapi@postgres:5432/tokensapi}
      - JWT_SECRET=${JWT_SECRET:-tokensbyte-change-me-in-production}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - REGISTER_ENABLED=${REGISTER_ENABLED:-true}
      - RUST_LOG=${RUST_LOG:-info}
      - DATA_DIR=/app/data
    command: sh -c "/app/tokensbyte-server 2>&1 | tee -a /app/logs/backend.log"
    volumes:
      - ./data:/app/data
      - ./logs/backend:/app/logs
    # 不暴露端口到宿主机，仅通过前端 nginx 反向代理访问
    networks:
      - app-network
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.5'

  frontend:
    image: ${PROJECT_NAME:-tokensbyte}-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
    pull_policy: never
    container_name: ${PROJECT_NAME:-tokensbyte}-frontend
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    environment:
      - CLIENT_MAX_BODY_SIZE=${CLIENT_MAX_BODY_SIZE:-50m}
    volumes:
      - ./logs/frontend:/var/log/nginx
    networks:
      - app-network
    depends_on:
      - backend
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.25'

networks:
  app-network:
    driver: bridge
    name: ${PROJECT_NAME:-tokensbyte}-network

volumes:
  postgres-data:
    name: tokensbyte_postgres-data
