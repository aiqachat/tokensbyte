# TokensByte Docker Compose 配置
# ──────────────────────────────────────────────────
# 一键启动: docker compose up -d
#
# 优先级: .env 文件 > compose 内默认值
# 镜像策略: pull_policy=never 使用本地镜像，不自动构建
# 如需重新构建: docker compose build 或改 pull_policy: missing
# ──────────────────────────────────────────────────
#
# ── 切换为外部数据库 ──────────────────────────────
# 1. 修改 .env 中的 DATABASE_URL 指向外部数据库
#    例: DATABASE_URL=postgres://user:pass@db.example.com:5432/tokensbyte
# 2. 注释掉下方 postgres 服务
# 3. 删除 backend 的 depends_on: postgres
# ──────────────────────────────────────────────────

services:
  postgres:
    image: postgres:18.4-alpine
    container_name: ${PROJECT_NAME:-tokensbyte}-postgres
    command: postgres -c shared_buffers=512MB -c work_mem=32MB -c maintenance_work_mem=128MB -c effective_cache_size=1536MB -c synchronous_commit=off -c checkpoint_completion_target=0.9 -c wal_buffers=16MB -c random_page_cost=1.1
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-tokensapi}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-tokensapi}
      - POSTGRES_DB=${POSTGRES_DB:-tokensapi}
    volumes:
      - postgres-data:/var/lib/postgresql
    # 可选：暴露端口到宿主机，方便本地工具连接（如 pgAdmin, DBeaver 等）
    # 如需暴露，取消下面两行注释
    # ports:
    #   - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - app-network
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tokensapi}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ${PROJECT_NAME:-tokensbyte}-backend:latest
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        # 0=容器内编译（默认，跨平台安全）；1=使用根目录 tokensbyte-server-bin（需 Linux ELF 且架构匹配）
        USE_PREBUILT: ${USE_PREBUILT:-0}
        # 脚本会注入：Mac 默认 1、Windows 默认 2；交叉架构强制 1；可自行覆盖
        CARGO_BUILD_JOBS: ${CARGO_BUILD_JOBS:-1}
        # 1=启用 Cargo BuildKit cache；交叉架构(QEMU)时导出脚本会置 0 防 segfault
        ENABLE_CARGO_CACHE: ${ENABLE_CARGO_CACHE:-1}
    pull_policy: missing
    container_name: ${PROJECT_NAME:-tokensbyte}-backend
    stop_grace_period: 120s
    environment:
      - HOST=0.0.0.0
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL:-postgres://tokensapi:tokensapi@postgres:5432/tokensapi}
      - JWT_SECRET=${JWT_SECRET:-} # 可选：手动指定，留空则自动生成强随机密钥并持久化
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin} # 可选：手动指定，默认为 admin
      # - CORS_ORIGINS=${CORS_ORIGINS}                    # 生产环境设置允许的前端域名（逗号分隔），如: https://example.com
      - REGISTER_ENABLED=${REGISTER_ENABLED:-true}
      - RUST_LOG=${RUST_LOG:-info}
      - DATA_DIR=/app/data
      - TZ=Asia/Shanghai
      - LOG_DIR=/app/logs
    command: /app/tokensbyte-server
    volumes:
      - ./data:/app/data
      - ./logs/backend:/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "6"
    # 不暴露端口到宿主机，仅通过前端 nginx 反向代理访问
    networks:
      - app-network
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.5'

  frontend:
    image: ${PROJECT_NAME:-tokensbyte}-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
    pull_policy: missing
    container_name: ${PROJECT_NAME:-tokensbyte}-frontend
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    environment:
      - CLIENT_MAX_BODY_SIZE=${CLIENT_MAX_BODY_SIZE:-50m}
    volumes:
      - ./logs/frontend:/var/log/nginx
    networks:
      - app-network
    depends_on:
      - backend
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:80/ || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.25'

networks:
  app-network:
    driver: bridge
    name: ${PROJECT_NAME:-tokensbyte}-network

volumes:
  postgres-data:
    name: tokensbyte_postgres-data
