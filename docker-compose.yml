# TokensByte 开发环境 Docker Compose 配置
# 使用外部 PostgreSQL 数据库，仅包含 Backend 和 Frontend
#
# 使用前请在 .env 文件中配置 DATABASE_URL，例如：
#   DATABASE_URL=postgres://用户名:密码@数据库地址:5432/数据库名

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tokensbyte-backend
    environment:
      - HOST=0.0.0.0
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL:?请在 .env 中配置 DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET:-tokensbyte-change-me}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-123456}
      - REGISTER_ENABLED=${REGISTER_ENABLED:-true}
    volumes:
      - ./backend/data:/data
    ports:
      - "3000:3000"
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tokensbyte-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: always
