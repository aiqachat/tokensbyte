services:
  db:
    image: postgres:15-alpine
    container_name: tokensbyte-db
    environment:
      - POSTGRES_USER=tokensapi
      - POSTGRES_PASSWORD=tokensapi
      - POSTGRES_DB=tokensapi
    ports:
      - "5432:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tokensapi -d tokensapi"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tokensbyte-backend
    environment:
      - HOST=0.0.0.0
      - PORT=3000
      - DATABASE_URL=postgres://tokensapi:tokensapi@db:5432/tokensapi
      - JWT_SECRET=tokensbyte-change-me
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=123456
      - REGISTER_ENABLED=true
    volumes:
      - ./backend/data:/data
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tokensbyte-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: always

volumes:
  pgdata:
